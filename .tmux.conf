set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-titles on
set-option -g status-left-length 128
set-option -g mouse on
set-option -g status-interval 5
set-option -g history-limit 100000
set-option -g renumber-windows on
set-option -s escape-time 0
set-option -wg mode-keys vi
bind-key C-u copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe \
        "command -v pbcopy >/dev/null && pbcopy || wl-copy"
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
bind-key -r C-p previous-window
bind-key -r C-n next-window
bind-key \; switch-client -l
bind-key C-h select-pane -L
bind-key C-j select-pane -D
bind-key C-k select-pane -U
bind-key C-l select-pane -R
bind-key r command-prompt -p "shell_cmd>" "run-shell -b '%1'"
bind-key -n C-Space command-prompt -p "pattern*>" {
    set -g @projectile-pattern "%1"
    run-shell -b "bash -c 'projectile #{q:@projectile-pattern}'"
} # passes prompt input shell-quoted into the script
