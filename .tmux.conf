set-option -g prefix C-a
bind-key C-a send-prefix
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g renumber-windows on
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-titles on
set-option -s escape-time 0
set-option -g window-status-format "#I#{?#{!=:#{pane_current_command},fish},›,:}#W#{window_flags}"
set-option -g window-status-current-format "#I#{?#{!=:#{pane_current_command},fish},›,:}#W#{window_flags}"
set-option -g status-interval 1
set-option -g window-status-current-style "bold,reverse"
set-option -g status-right "#{?client_prefix,^a ,}%a %d %b %H:%M"
set-option -g status-left-length 128
set-option -g mouse on
set-option -sg history-limit 100000
set-option -wg mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "[ $(uname) = Darwin ] && pbcopy || wl-copy"
bind-key k copy-mode
bind-key j command-prompt -p "➜ pattern*:" "run-shell -b 'fish -c \"projectile %1\"'"
bind-key h command-prompt -p "➜ help?:" "run-shell -b 'fish -c \"help_for %1\"'"
bind-key l switch-client -l
bind-key -r C-n next-window
bind-key -r C-p previous-window
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
