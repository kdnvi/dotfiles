# better prefix than default C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key r source-file ~/.tmux.conf\; display "reloaded"

# vim truecolor support
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"

# base 1 for windows and panes, more intuitive for interactive use
set-option -g base-index 1
set-option -wg pane-base-index 1
set-option -g renumber-windows on

# observability enhancement
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-titles on
set-option -s escape-time 0

# mark [»] if the pane has running process (except shell process)
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g status-interval 1

# better recognition on quick look
set-option -g window-status-current-style "bold,reverse"
set-option -g status-right "#{?client_prefix,^a ,}%a %d %b %H:%M"
set-option -g status-left-length 128

# can use mouse when needed
set-option -g mouse on
set-option -sg history-limit 100000

# prefer vi keybindings in copy mode
set-option -wg mode-keys vi
bind-key -n C-b copy-mode
bind-key -T copy-mode-vi C-b send-keys -X cancel

# same key as vi for select and yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe

# quickly switch between windows/sessions by name/prefix, also
# find and create session of a project (project ~ session)
unbind -T copy-mode-vi C-f
bind-key -n C-f command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key h command-prompt -p "help for:" "run-shell 'man \"%1\" 2>/dev/null || \"%1\" --help 2>&1'"

# last session switch - very useful when combining with projectile
bind-key -n C-Space switch-client -l
bind-key -r C-n next-window
bind-key -r C-p previous-window

# move window left/right constantly
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
