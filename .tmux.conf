set-option -g prefix C-f
bind-key C-f switch-client -l
bind-key r source-file ~/.tmux.conf\; display "reloaded"
set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g base-index 1
set-option -wg pane-base-index 1
set-option -g renumber-windows on
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-titles on
set-option -s escape-time 0
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},»,}"
set-option -g status-interval 1
set-option -g window-status-current-style "bold,reverse"
set-option -g status-right "#{?client_prefix,^f ,}%a %d %b %H:%M"
set-option -g status-left-length 128
set-option -g mouse on
set-option -sg history-limit 100000
set-option -wg mode-keys vi
bind-key -n C-b copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe
unbind -T copy-mode-vi C-b
bind-key -n C-Space command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key h command-prompt -p "help for:" "run-shell -b 'fish -lc \"helpfor %1\"'"
bind-key -r C-n next-window
bind-key -r C-p previous-window
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
