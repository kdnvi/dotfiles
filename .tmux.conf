# set-option -g prefix C-s
# bind-key C-s send-prefix
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",tmux-256color:RGB"
set-option -g status-position bottom
set-option -g status-left-length 128
set-option -g remain-on-exit off
set-option -g set-titles on
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g mouse on
set-option -g visual-activity on
set-option -g focus-events on
set-option -g status-interval 5
set-option -g window-status-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},#[fg=red]▸#[default],}"
set-option -g window-status-current-format "#I:#W#{window_flags}#{?#{!=:#{pane_current_command},fish},#[fg=red]▸#[default],}"
set-option -g window-status-current-style "bg=colour173"
set-option -sg repeat-time 500
set-option -sg escape-time 10
set-option -sg history-limit 100000
set-option -sg set-clipboard on
set-window-option -g xterm-keys on
set-window-option -g mode-keys vi
bind-key -n M-[ copy-mode
bind-key -n M-] paste-buffer -p
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y if-shell '[ "$(uname -s)" = "Darwin" ]' 'send-keys -X copy-pipe "pbcopy"' 'send-keys -X copy-pipe "wl-copy"'
bind-key -n M-Space command-prompt -p "project pattern:" "run-shell -b 'fish -lc \"projectile %1\"'"
bind-key -n M-z command-prompt -p "help for:" "run-shell -b 'man %1 || %1 --help || %1 help'"
bind-key -n M-s switch-client -l
bind-key -n M-a switch-client -t 0
bind-key -n M-p previous-window
bind-key -n M-n next-window
bind-key -n M-c new-window
bind-key -n M-: command-prompt
bind-key -n M-| split-window -h
bind-key -n M-- split-window -v
bind-key -n M-w choose-tree -Zs
bind-key -n M-x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key -n M-k select-pane -U
bind-key -n M-j select-pane -D
bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
bind-key -n M-Up resize-pane -U 5
bind-key -n M-Down resize-pane -D 5
bind-key -n M-Left resize-pane -L 5
bind-key -n M-Right resize-pane -R 5
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10
bind-key -n M-r source-file ~/.tmux.conf
unbind C-b
