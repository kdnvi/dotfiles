set-option -g default-terminal "tmux-256color"
set-option -g terminal-overrides "*:RGB"
set-option -g status-right "#{?client_prefix,^b ,}#(uptime | awk -F'load averages?: ' '{print $2}' | tr -d ',') | %a %d %b %H:%M"
set-option -g status-left-length 128
set-option -g status-style fg=darkgrey
set-option -g window-status-current-style "bold,reverse"
set-option -g focus-events on
set-option -g extended-keys on
set-option -g renumber-windows on
set-option -g set-titles on
set-option -g mouse on
set-option -g copy-mode-line-numbers relative
set-option -g status-interval 5
set-option -g history-limit 100000
set-option -s escape-time 0
set-option -wg mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
bind-key -r C-p previous-window
bind-key -r C-n next-window
bind-key -n C-Space command-prompt -p "pattern*>" {
    set -g @projectile-pattern "%1"
    run-shell -b "fish -c 'projectile #{q:@projectile-pattern}'"
} # passes prompt input shell-quoted into fish
bind-key h command-prompt -p "help?>" "run-shell -b 'fish -c \"help_for %1\"'"
bind-key l switch-client -l
